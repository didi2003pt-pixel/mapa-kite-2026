<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - 2026 Formula Kite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Imagem de fundo -->
    <!-- Nota: Corrigi para .jpg consoante o ficheiro que fizeste upload -->
    <div class="absolute inset-0 bg-[url(image_11335c.jpg)] bg-cover bg-center opacity-20"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 to-transparent"></div>

    <!-- Container do formulário -->
    <div class="max-w-md w-full bg-slate-900/90 backdrop-blur-md border border-slate-800 rounded-3xl p-8 shadow-2xl relative z-10">
        
        <div class="text-center mb-8">
            <img src="image_11335c.jpg" alt="Formula Kite Viana do Castelo" class="w-64 mx-auto mb-6 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold text-white mb-2">Acesso Exclusivo</h2>
            <p class="text-slate-400">Registe-se para aceder à plataforma</p>
        </div>

        <!-- Formulário com FormSubmit e ID para o JavaScript apanhar -->
        <form id="formAcesso" action="https://formsubmit.co/comunicacao@fpvela.pt" method="POST">
            
            <!-- Configurações extra do FormSubmit para UX limpa -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="Novo Registo na App - Formula Kite 2026">
            
            <div class="mb-5">
                <label class="block text-sm font-medium text-slate-300 mb-2">Nome</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-3.5 text-slate-500 w-5 h-5"></i>
                    <input type="text" name="Nome" required class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Ex: João Silva">
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-300 mb-2">E-mail</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-3.5 text-slate-500 w-5 h-5"></i>
                    <input type="email" name="Email" required class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="teu@email.com">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 mt-4 shadow-lg shadow-blue-600/20">
                Entrar na App
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <script>
        // Inicializar os ícones
        lucide.createIcons();

        // Intercetar o envio para garantir que a pessoa entra na App mesmo que o email demore a processar
        document.getElementById('formAcesso').addEventListener('submit', function(e) {
            // Guarda a "chave" que o teu index.html está a pedir
            localStorage.setItem('acesso_permitido', 'sim');
            
            // Alterar o botão para dar feedback visual (opcional mas boa prática)
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = 'A processar... <i data-lucide="loader" class="w-5 h-5 animate-spin"></i>';
            lucide.createIcons();
            
            // Deixa o formulário seguir o seu caminho natural para o FormSubmit.
            // NOTA: Como não estamos a bloquear o envio (preventDefault), ele vai enviar o email.
        });
    </script>
</body>
</html>
