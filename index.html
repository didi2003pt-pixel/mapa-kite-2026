              { id: 'trailer_park', type: 'logistics', name: 'Trailer Park', description: lang === 'pt' ? 'Estacionamento de atrelados.' : 'Trailer parking.', coords: [[41.685294,-8.837139],[41.685448,-8.837358],[41.685157,-8.837791],[41.685004,-8.837564]], iconStr: 'truck', icon: <MIcon name="truck" />, color: '#64748b', twColor: 'bg-slate-500' },
              { id: 'rib_south', type: 'logistics', name: 'Rib South', description: lang === 'pt' ? 'Estacionamento de barcos de apoio a sul.' : 'Support boats parking south.', coords: [[41.683102,-8.829154],[41.683367,-8.829112],[41.683573,-8.830164],[41.683328,-8.830247]], iconStr: 'anchor', icon: <MIcon name="anchor" />, color: '#f97316', twColor: 'bg-orange-500' },
              { id: 'rib_north', type: 'logistics', name: 'Rib Area North', description: lang === 'pt' ? 'Estacionamento de barcos de apoio a norte.' : 'Support boats parking north.', coords: [[41.686631,-8.838747],[41.686393,-8.839250],[41.685539,-8.838522],[41.685732,-8.838111]], iconStr: 'anchor', icon: <MIcon name="anchor" />, color: '#f97316', twColor: 'bg-orange-500' },
              { id: 'rib_crane', type: 'logistics', name: 'Rib Crane', description: lang === 'pt' ? 'Grua para colocação de barcos.' : 'Crane for deploying boats.', coords: [[41.685025,-8.838565],[41.684902,-8.838449],[41.685060,-8.838120],[41.685173,-8.838277]], iconStr: 'ship', icon: <MIcon name="ship" />, color: '#06b6d4', twColor: 'bg-cyan-500' },
              { id: 'eco_1', type: 'eco', name: lang === 'pt' ? 'Eco Station (Público)' : 'Eco Station (Public)', description: lang === 'pt' ? 'Estação de reciclagem para o público e restauração.' : 'Recycling station for the public and food court.', coords: [[41.678750,-8.831300]], iconStr: 'recycle', icon: <MIcon name="recycle" />, color: '#22c55e', twColor: 'bg-green-500' },
              { id: 'eco_2', type: 'eco', name: lang === 'pt' ? 'Eco Station (Atletas)' : 'Eco Station (Athletes)', description: lang === 'pt' ? 'Estação de reciclagem na zona técnica e tenda dos atletas.' : 'Recycling station in the technical area and athletes tent.', coords: [[41.678500,-8.830900]], iconStr: 'recycle', icon: <MIcon name="recycle" />, color: '#22c55e', twColor: 'bg-green-500' },
              { id: 'eco_3', type: 'eco', name: lang === 'pt' ? 'Eco Station (Norte)' : 'Eco Station (North)', description: lang === 'pt' ? 'Ponto de recolha e ecoponto na zona norte e Trailer Park.' : 'Collection point and ecopoint in the north zone and Trailer Park.', coords: [[41.685300,-8.837500]], iconStr: 'recycle', icon: <MIcon name="recycle" />, color: '#22c55e', twColor: 'bg-green-500' }
          ], [lang]);

          const kmlLines = [
              { id: 'north_barrier', name: 'North Beach Barrier', color: '#ef4444', coords: [[41.679339,-8.832465],[41.678788,-8.832961]] },
              { id: 'south_barrier', name: 'South Beach Barrier', color: '#ef4444', coords: [[41.678167,-8.830496],[41.677703,-8.830962]] }
          ];

          const filteredLocations = useMemo(() => {
              if (activeFilters.includes('all')) return kmlLocations;
              return kmlLocations.filter(loc => activeFilters.includes(loc.type));
          }, [activeFilters, kmlLocations]);

          // --- LEAFLET MAP EFFECT (ABA DE MAPA) ---
          useEffect(() => {
              if (activeTab !== 'map' || showSplash) return;
              
              const mapContainer = document.getElementById('real-map');
              if (!mapContainer || !window.L) return;

              // LIMPEZA SEGURA DO LEAFLET: Remove o _leaflet_id caso o React tenha mantido o DOM vivo
              if (mapContainer._leaflet_id) {
                  mapContainer._leaflet_id = null;
              }
              if (window.leafletMap) {
                  window.leafletMap.remove();
                  window.leafletMap = null;
              }

              const map = window.L.map('real-map', { zoomControl: false }).setView([41.679, -8.836], 15);
              window.leafletMap = map;
              
              window.L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                  maxZoom: 20,
                  attribution: '© Google'
              }).addTo(map);

              kmlLines.forEach(line => {
                  window.L.polyline(line.coords, { color: line.color, weight: 4, dashArray: '5, 5' }).addTo(map);
              });

              kmlLocations.forEach(loc => {
                  if (loc.coords.length > 2) {
                      window.L.polygon(loc.coords, {
                          color: loc.color,
                          fillColor: loc.color,
                          fillOpacity: 0.4,
                          weight: 2
                      }).addTo(map);
                  }

                  let latSum = 0, lngSum = 0;
                  loc.coords.forEach(c => { latSum += c[0]; lngSum += c[1]; });
                  const center = [latSum / loc.coords.length, lngSum / loc.coords.length];
                  
                  const divIcon = window.L.divIcon({
                      className: 'leaflet-div-icon-custom',
                      html: `<div class="${loc.twColor} w-8 h-8 rounded-xl shadow-[0_0_15px_rgba(0,0,0,0.5)] border-2 border-white flex items-center justify-center text-white cursor-pointer hover:scale-110 transition-transform" onclick="window.selectLocGlobal('${loc.id}')">
                               <i data-lucide="${loc.iconStr}" style="width:16px;height:16px;"></i>
                             </div>`,
                      iconSize: [32, 32],
                      iconAnchor: [16, 16]
                  });

                  window.L.marker(center, {icon: divIcon}).addTo(map);
              });
              
              setTimeout(() => { 
                  if(window.leafletMap) window.leafletMap.invalidateSize();
                  if(window.lucide) window.lucide.createIcons(); 
              }, 200);

              // FUNÇÃO DE CLEANUP REACT: Destrói a instância ao desmontar
              return () => {
                  if (window.leafletMap) {
                      window.leafletMap.remove();
                      window.leafletMap = null;
                  }
              };
          }, [activeTab, showSplash, kmlLocations]);

          // --- LEAFLET TRACKING EFFECT (NOVA ABA TRACKING) ---
          const trackingMapRef = useRef(null);
          const markersRef = useRef({});

          useEffect(() => {
              if (activeTab !== 'tracking' || showSplash) return;
              
              let timeoutId = setTimeout(() => {
                  const mapContainer = document.getElementById('tracking-map');
                  if (!mapContainer || !window.L) return;

                  // LIMPEZA SEGURA DO LEAFLET: Remove o _leaflet_id caso o React tenha mantido o DOM vivo
                  if (mapContainer._leaflet_id) {
                      mapContainer._leaflet_id = null;
                  }
                  if (trackingMapRef.current) {
                      trackingMapRef.current.remove();
                      trackingMapRef.current = null;
                  }
                  
                  const map = window.L.map('tracking-map', { zoomControl: false }).setView([41.675, -8.855], 14);
                  trackingMapRef.current = map;
                  
                  window.L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                      maxZoom: 20,
                      attribution: '© Google'
                  }).addTo(map);

                  // APENAS AS ZONAS AMARELAS (Race Areas) E LINHAS
                  kmlLines.forEach(line => {
                      window.L.polyline(line.coords, { color: line.color, weight: 4, dashArray: '5, 5' }).addTo(map);
                  });

                  kmlLocations.filter(loc => loc.type === 'race').forEach(loc => {
                      if (loc.coords.length > 2) {
                          window.L.polygon(loc.coords, {
                              color: loc.color,
                              fillColor: loc.color,
                              fillOpacity: 0.4,
                              weight: 2
                          }).addTo(map);
                      }
                  });
                  
                  setTimeout(() => { 
                      if(trackingMapRef.current) trackingMapRef.current.invalidateSize();
                  }, 200);
              }, 100);

              // FUNÇÃO DE CLEANUP REACT: Destrói a instância ao desmontar
              return () => {
                  if (timeoutId) clearTimeout(timeoutId);
                  if (trackingMapRef.current) {
                      trackingMapRef.current.remove();
                      trackingMapRef.current = null;
                      markersRef.current = {};
                  }
              };
          }, [activeTab, showSplash, kmlLocations]);

          // ATUALIZAÇÃO DOS PINOS EM TEMPO REAL
          useEffect(() => {
              if (activeTab === 'tracking' && trackingMapRef.current && window.L) {
                  const map = trackingMapRef.current;
                  
                  liveAthletes.forEach(a => {
                      if (markersRef.current[a.id]) {
                          markersRef.current[a.id].setLatLng([a.lat, a.lng]);
                      } else {
                          const iconHtml = `
                              <div class="flex flex-col items-center group">
                                  <div class="bg-slate-900 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-lg whitespace-nowrap mb-1 flex items-center gap-1 group-hover:scale-125 transition-transform border border-slate-700">
                                      <span>${a.flag}</span> ${a.sail}
                                  </div>
                                  <div class="w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-[0_0_10px_rgba(239,68,68,0.8)] animate-pulse"></div>
                              </div>
                          `;
                          const divIcon = window.L.divIcon({
                              className: 'leaflet-div-icon-custom',
                              html: iconHtml,
                              iconSize: [40, 40],
                              iconAnchor: [20, 40]
                          });
                          const marker = window.L.marker([a.lat, a.lng], { icon: divIcon }).addTo(map);
                          markersRef.current[a.id] = marker;
                      }
                  });
              }
          }, [liveAthletes, activeTab]);

          useEffect(() => {
              window.selectLocGlobal = (id) => {
                  const loc = kmlLocations.find(l => l.id === id);
                  if(loc) setSelectedPoint(loc);
              };
          }, [kmlLocations]);

          useEffect(() => {
              if (selectedPoint && window.leafletMap) {
                  let latSum = 0, lngSum = 0;
                  selectedPoint.coords.forEach(c => { latSum += c[0]; lngSum += c[1]; });
                  const center = [latSum / selectedPoint.coords.length, lngSum / selectedPoint.coords.length];
                  window.leafletMap.flyTo(center, 17, { duration: 1.5 });
              }
          }, [selectedPoint]);

              { date: '8 Mai', activity: lang === 'pt' ? 'Abertura do Recinto / Registo' : 'Venue Opening / Registration', time: '15:00 - 18:00', status: 'setup' },

              { date: '11-15 Mai', activity: lang === 'pt' ? 'Opening Series (Qualificação)' : 'Opening Series (Qualifying)', time: '11:00+', status: 'race' },
              { date: '16 Mai', activity: lang === 'pt' ? 'Medal Series & Entrega de Prémios' : 'Medal Series & Prize Giving', time: '12:15 / 18:00', status: 'final' },
          ], [lang]);

             if(!chatInput) return;
             setChatHistory(prev => [...prev, { role: 'user', text: chatInput }]);
             setChatInput(''); setIsTyping(true);
             setTimeout(() => {
                 setChatHistory(prev => [...prev, { role: 'model', text: lang === 'pt' ? 'A Formula Kite é uma classe olímpica de extrema velocidade e tática! A nortada em Viana é ideal para estas pranchas hydrofoil.' : 'Formula Kite is an extremely fast and tactical Olympic class! The Nortada wind in Viana is ideal for these hydrofoils.' }]);
                 setIsTyping(false);

                      <img src="image_11335c.png" alt="Formula Kite Logo" className="h-24 md:h-32 lg:h-40 mb-6 animate-pulse object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]" />
                      <h1 className="text-white font-black tracking-[0.2em] text-xl lg:text-2xl uppercase">Viana 2026</h1>

                            <div>
                                <span className="inline-block bg-red-500 text-white text-[10px] font-black uppercase px-2 py-1 rounded-md animate-pulse mb-2">{t.arOverlayTitle}</span>

                                <MIcon name="x" size={14} /> {t.arClose}

                        <div className="absolute top-8 right-1/2 translate-x-1/2 text-white/50 text-xl font-light tracking-[0.5em] flex gap-8 z-10 pointer-events-none">

                                <div className="w-1 h-1 bg-emerald-400 rounded-full"></div>
                                <div className="absolute top-0 bottom-0 left-1/2 w-px bg-white/20"></div>

                                    <p className="text-white font-bold text-[10px] md:text-xs">{t.arMark1}</p>
                                    <p className="text-emerald-400 font-mono text-[9px]">{t.arDistance}</p>
                                </div>
                            </div>
                            <div className="absolute right-[25%] top-[55%] animate-float flex flex-col items-center group cursor-pointer" style={{ animationDelay: '1.5s' }}>
                                <div className="w-6 h-6 md:w-10 md:h-10 bg-yellow-400 rounded-full shadow-[0_0_20px_rgba(250,204,21,0.6)] border-[3px] border-white flex items-center justify-center text-yellow-900 mb-2 transform rotate-12 group-hover:scale-110 transition-transform">
                                    <MIcon name="triangle" size={12} className="rotate-180" />
                                </div>

                                    <p className="text-white font-bold text-[9px] md:text-[10px]">{t.arMark2}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* TOAST NOTIFICATION 7️⃣ */}
                {toastMsg && (
                    <div className="absolute top-20 left-1/2 -translate-x-1/2 z-50 animate-slide-down">

                            <MIcon name="radio" size={18} className="text-emerald-400 dark:text-emerald-600 animate-pulse" />

                             <a href="https://kiteclasses.org" target="_blank" className="flex items-center gap-1 hover:text-white transition-colors"><MIcon name="wind" size={12}/> IKA</a>
                             <a href="https://fpvela.pt" target="_blank" className="flex items-center gap-1 hover:text-white transition-colors"><MIcon name="flag" size={12}/> FPVela</a>
                         </div>
                     </div>
                  </div>

                  {/* Main Header Area */}
                  <div className="px-4 py-3 lg:px-6 lg:py-4 flex flex-col lg:flex-row lg:items-center justify-between gap-3 lg:gap-4 border-b border-slate-800">
                      <div className="flex items-center justify-between w-full lg:w-auto">
                          {/* Logo e Título com Subtítulo e Bandeira */}
                          <div className="flex items-center gap-3 lg:gap-4">
                            <img src="image_11335c.png" alt="Formula Kite Logo" className="h-14 md:h-16 lg:h-20 shrink-0 object-contain drop-shadow-[0_2px_10px_rgba(255,255,255,0.15)]" />
                            <div>
                              <h1 className="text-base lg:text-xl font-black tracking-tight leading-none uppercase">
                                2026 Formula Kite
                                <span className="block text-slate-400 text-[9px] lg:text-[11px] mt-0.5 tracking-widest">World Championships</span>

                            </button>
                          </div>
                      </div>
                      
                      {/* Nav Bar */}

                        {[
                            { id: 'tracking', icon: 'crosshair', label: t.tabTracking, alert: true },
                            { id: 'map', icon: 'map', label: t.tabMap },
                            { id: 'results', icon: 'list-ordered', label: t.tabResults },
                            { id: 'athletes', icon: 'users', label: t.tabAthletes },
                            { id: 'hotel', icon: 'building', label: t.tabHotel },
                            { id: 'schedule', icon: 'calendar', label: t.tabSchedule },
                            { id: 'ai', icon: 'sparkles', label: t.tabAI },
                            { id: 'settings', icon: 'settings', label: t.tabSettings }
                        ].map(tab => (

                                      <h4 className="font-bold text-slate-800 dark:text-white">Localização Premium</h4>
                                      <p className="text-sm text-slate-500 mt-2">Acesso direto à Praia do Cabedelo e à "Race Area".</p>
                                  </div>
                                  <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                                      <MIcon name="wind" className="text-emerald-500 mb-4 w-8 h-8" />
                                      <h4 className="font-bold text-slate-800 dark:text-white">Sports Center</h4>
                                      <p className="text-sm text-slate-500 mt-2">Equipado para todas as necessidades dos atletas de Kite e Foil.</p>
                                  </div>
                                  <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800">
                                      <MIcon name="coffee" className="text-amber-500 mb-4 w-8 h-8" />
                                      <h4 className="font-bold text-slate-800 dark:text-white">Spa & Recuperação</h4>
                                      <p className="text-sm text-slate-500 mt-2">Serviços de bem-estar para recuperação pós-regata.</p>
                                  </div>
                              </div>
                          </div>
                      </div>
                  ) : activeTab === 'schedule' ? (
                    <div className="flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-950 p-4 lg:p-12 animate-in fade-in duration-500 transition-colors">
                      <div className="max-w-4xl mx-auto pb-8">
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-4 lg:gap-6 mb-6 lg:mb-12 bg-white dark:bg-slate-900 p-6 lg:p-8 rounded-2xl lg:rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-800 transition-colors">
                          <div>
                            <h2 className="text-2xl lg:text-4xl font-black text-slate-900 dark:text-white tracking-tighter uppercase leading-none">
                              {t.schedTitle}
                            </h2>
                          </div>
                          <div className="inline-flex self-start md:self-auto items-center gap-2 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 px-3 py-1.5 lg:px-4 lg:py-2 rounded-lg lg:rounded-xl font-bold text-xs lg:text-sm border border-blue-100 dark:border-blue-800">
                            <MIcon name="info" size={16} className="lg:w-[18px] lg:h-[18px]" /> {t.schedDoc}
                          </div>
                        </div>

                        <div className="space-y-3 lg:space-y-4">
                          {eventSchedule.map((item, idx) => (
                            <div key={idx} className="bg-white dark:bg-slate-900 p-5 lg:p-6 rounded-2xl lg:rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row md:items-center gap-3 lg:gap-6">
                              <div className="w-auto md:w-24 shrink-0 flex items-center justify-between md:block">
                                <span className="text-lg lg:text-2xl font-black text-slate-800 dark:text-slate-100 md:text-slate-300 dark:md:text-slate-700">{item.date}</span>
                                <span className={`md:hidden inline-block px-3 py-1 rounded-md text-[9px] font-black uppercase tracking-widest ${
                                  item.status === 'race' ? 'bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300' :
                                  item.status === 'final' ? 'bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300' :
                                  item.status === 'setup' ? 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400' :
                                  'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-300'
                                }`}>
                                  {item.status}
                                </span>
                              </div>
                              <div className="flex-1 md:border-l-2 border-slate-100 dark:border-slate-800 md:pl-6">
                                <h4 className="font-black text-sm lg:text-lg text-slate-800 dark:text-slate-100">{item.activity}</h4>
                                <div className="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-xs lg:text-sm mt-1 lg:mt-2 font-medium">
                                  <MIcon name="clock" size={14} className="text-emerald-500 lg:w-4 lg:h-4" /> {item.time}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>

                        <div className="mt-8 lg:mt-12 grid grid-cols-1 md:grid-cols-2 gap-4 lg:gap-6">
                          <div className="bg-slate-900 dark:bg-black text-white p-6 lg:p-8 rounded-2xl lg:rounded-[2.5rem] shadow-xl relative overflow-hidden border border-transparent dark:border-slate-800">
                            <h5 className="font-black text-[10px] lg:text-xs text-emerald-400 uppercase tracking-widest mb-4 lg:mb-6 flex items-center gap-2">
                              <MIcon name="check-circle" size={14} className="lg:w-4 lg:h-4" /> {t.schedRulesTitle}
                            </h5>
                            <div className="space-y-4 lg:space-y-5 relative z-10">
                              <div>
                                <span className="text-[10px] lg:text-xs font-bold text-slate-400">Target Time (Opening)</span>
                                <p className="text-xl lg:text-2xl font-black">12 {lang === 'pt' ? 'minutos' : 'minutes'}</p>
                              </div>
                              <div className="h-px bg-white/10 w-full"></div>
                              <div>
                                <span className="text-[10px] lg:text-xs font-bold text-slate-400">Target Time (Medal Series)</span>
                                <p className="text-xl lg:text-2xl font-black">7 {lang === 'pt' ? 'minutos' : 'minutes'}</p>
                              </div>
                            </div>
                            <MIcon name="waves" size={128} className="absolute -right-4 -bottom-4 w-24 h-24 lg:w-32 lg:h-32 text-white/5" />
                          </div>

                          <div className="bg-white dark:bg-slate-900 p-6 lg:p-8 rounded-2xl lg:rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-sm relative overflow-hidden flex flex-col justify-between transition-colors">
                            <div>
                              <h5 className="font-black text-[10px] lg:text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4 lg:mb-6">{t.schedRulesDesc}</h5>
                              <ul className="space-y-3 lg:space-y-4 text-xs lg:text-sm font-semibold text-slate-600 dark:text-slate-300 relative z-10">
                                <li className="flex gap-2 lg:gap-3"><span className="text-emerald-500">•</span><span>{t.rule1}</span></li>
                                <li className="flex gap-2 lg:gap-3"><span className="text-emerald-500">•</span><span>{t.rule2}</span></li>
                                <li className="flex gap-2 lg:gap-3"><span className="text-emerald-500">•</span><span>{t.rule3}</span></li>
                              </ul>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : activeTab === 'ai' ? (
                      <div className="flex-1 flex flex-col bg-slate-100 dark:bg-slate-950 overflow-hidden animate-in fade-in duration-500 transition-colors">
                        <div className="bg-emerald-900 dark:bg-emerald-950 text-white p-4 lg:p-6 shadow-md shrink-0 border-b border-emerald-800 z-10">
                          <div className="max-w-4xl mx-auto">
                            <h2 className="text-lg lg:text-2xl font-black tracking-tight flex items-center gap-2 lg:gap-3 text-emerald-100">
                              <MIcon name="sparkles" size={18} className="text-emerald-400 lg:w-6 lg:h-6" /> {t.aiTitle}
                            </h2>
                            <p className="text-emerald-400/80 text-[10px] lg:text-sm font-medium mt-1">{t.aiDisclaimer}</p>
                          </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-3 lg:p-8 space-y-4 lg:space-y-6 scroll-smooth">
                          <div className="max-w-4xl mx-auto space-y-4 lg:space-y-6 pb-2">
                            {chatHistory.map((msg, index) => (
                              <div key={index} className={`flex gap-3 lg:gap-4 ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                <div className={`w-8 h-8 lg:w-10 lg:h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm ${msg.role === 'user' ? 'bg-slate-800 dark:bg-slate-700 text-white' : 'bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400'}`}>
                                  <MIcon name={msg.role === 'user' ? 'user' : 'bot'} size={16} className="lg:w-5 lg:h-5" />
                                </div>
                                <div className={`px-4 py-3 lg:px-5 lg:py-4 rounded-2xl lg:rounded-[2rem] max-w-[85%] text-sm lg:text-base shadow-sm ${
                                  msg.role === 'user' 
                                  ? 'bg-slate-800 dark:bg-slate-700 text-white rounded-tr-none' 
                                  : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 rounded-tl-none border border-slate-100 dark:border-slate-800 leading-relaxed'
                                }`}>
                                  {msg.text.split('\n').map((line, i) => (
                                    <p key={i} className={i !== 0 ? 'mt-1 lg:mt-2' : ''}>{line}</p>
                                  ))}
                                </div>
                              </div>
                            ))}
                            
                            {isTyping && (
                              <div className="flex gap-3 lg:gap-4">
                                <div className="w-8 h-8 lg:w-10 lg:h-10 rounded-full bg-emerald-100 dark:bg-slate-900/50 text-emerald-600 dark:text-emerald-400 flex items-center justify-center shrink-0 shadow-sm">
                                  <MIcon name="sparkles" size={16} className="animate-spin-slow lg:w-5 lg:h-5" />
                                </div>
                                <div className="px-5 py-3 lg:px-6 lg:py-4 rounded-2xl lg:rounded-[2rem] bg-white dark:bg-slate-900 text-slate-500 rounded-tl-none border border-slate-100 dark:border-slate-800 shadow-sm flex items-center gap-1.5 h-[42px] lg:h-[56px]">
                                  <div className="w-1.5 h-1.5 lg:w-2 lg:h-2 bg-emerald-400 rounded-full typing-dot" />
                                  <div className="w-1.5 h-1.5 lg:w-2 lg:h-2 bg-emerald-400 rounded-full typing-dot" />
                                  <div className="w-1.5 h-1.5 lg:w-2 lg:h-2 bg-emerald-400 rounded-full typing-dot" />
                                </div>
                              </div>
                            )}
                            <div ref={chatEndRef} />
                          </div>
                        </div>

                        <div className="bg-white dark:bg-slate-900 p-3 lg:p-4 border-t border-slate-200 dark:border-slate-800 shrink-0 pb-safe transition-colors z-10">
                          <div className="max-w-4xl mx-auto relative flex items-center">
                            <input 
                              type="text" 
                              value={chatInput}
                              onChange={(e) => setChatInput(e.target.value)}
                              onKeyDown={(e) => e.key === 'Enter' && handleSendChat()}
                              placeholder={t.aiPlaceholder}
                              className="w-full bg-slate-50 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-800 dark:text-white rounded-full py-3 lg:py-4 pl-4 lg:pl-6 pr-14 lg:pr-16 text-sm lg:text-base outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all shadow-inner"
                              disabled={isTyping}
                            />
                            <button 
                              onClick={() => handleSendChat()}
                              disabled={isTyping || !chatInput.trim()}
                              className="absolute right-1.5 lg:right-2 w-10 h-10 lg:w-11 lg:h-11 rounded-full bg-emerald-500 text-white flex items-center justify-center hover:bg-emerald-600 disabled:opacity-50 disabled:hover:bg-emerald-500 transition-colors shadow-sm"
                            >
                              <MIcon name="send" size={16} className={`${chatInput.trim() ? 'ml-1' : ''} lg:w-[18px] lg:h-[18px]`} />
                            </button>
                          </div>
                        </div>
                      </div>
                  ) : (
                      /* Settings */
                      <div className="flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-950 p-4 lg:p-12 animate-in fade-in duration-500 transition-colors">
                          <div className="max-w-4xl mx-auto pb-12">
                              <h2 className="text-2xl lg:text-3xl font-black mb-8 dark:text-white mt-4">{t.settingsTitle}</h2>
                              
                              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                  {/* Coluna 1: Definições da App */}
                                  <div className="space-y-6">
                                      <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                                          <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                              <MIcon name="globe" size={16} /> {t.settingsLang}
                                          </h3>
                                          <div className="grid grid-cols-2 gap-3">
                                              <button onClick={() => setLang('pt')} className={`py-3 rounded-xl font-bold text-sm transition-all border-2 ${lang === 'pt' ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 shadow-sm' : 'border-transparent bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>🇵🇹 Português</button>
                                              <button onClick={() => setLang('en')} className={`py-3 rounded-xl font-bold text-sm transition-all border-2 ${lang === 'en' ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 shadow-sm' : 'border-transparent bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>🇬🇧 English</button>
                                          </div>
                                      </div>

                                      <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                                          <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                              <MIcon name="sun" size={16} /> {t.settingsTheme}
                                          </h3>
                                          <div className="grid grid-cols-2 gap-3">
                                              <button onClick={() => setIsDarkMode(false)} className={`py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 border-2 ${!isDarkMode ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 shadow-sm' : 'border-transparent bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>
                                                  <MIcon name="sun" size={16} /> {t.themeLight}
                                              </button>
                                              <button onClick={() => setIsDarkMode(true)} className={`py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 border-2 ${isDarkMode ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 shadow-sm' : 'border-transparent bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>
                                                  <MIcon name="moon" size={16} /> {t.themeDark}
                                              </button>
                                          </div>
                                      </div>
                                  </div>

                                  {/* Coluna 2: Parceiros Institucionais */}
                                  <div className="bg-white dark:bg-slate-900 p-6 lg:p-8 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
                                      <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                                          <MIcon name="building" size={16} /> {t.settingsPartners}
                                      </h3>
                                      
                                      <div className="space-y-4">
                                          <a href="https://fpvela.pt" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                                              <div className="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                                  <MIcon name="flag" size={24} />
                                              </div>
                                              <div className="flex-1">
                                                  <h4 className="font-bold text-sm text-slate-800 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">Federação Portuguesa de Vela</h4>
                                                  <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-tight mt-0.5">{t.partnerFPVDesc}</p>
                                              </div>
                                              <MIcon name="external-link" size={16} className="text-slate-300 dark:text-slate-600 group-hover:text-blue-500" />
                                          </a>

                                          <a href="https://kiteclasses.org" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                                              <div className="w-12 h-12 bg-sky-100 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                                  <MIcon name="wind" size={24} />
                                              </div>
                                              <div className="flex-1">
                                                  <h4 className="font-bold text-sm text-slate-800 dark:text-white group-hover:text-sky-600 dark:group-hover:text-sky-400 transition-colors">IKA</h4>
                                                  <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-tight mt-0.5">{t.partnerIKADesc}</p>
                                              </div>
                                              <MIcon name="external-link" size={16} className="text-slate-300 dark:text-slate-600 group-hover:text-sky-500" />
                                          </a>

                                          <a href="https://sailing.org" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                                              <div className="w-12 h-12 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                                  <MIcon name="compass" size={24} />
                                              </div>
                                              <div className="flex-1">
                                                  <h4 className="font-bold text-sm text-slate-800 dark:text-white group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">World Sailing</h4>
                                                  <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-tight mt-0.5">{t.partnerWSDesc}</p>
                                              </div>
                                              <MIcon name="external-link" size={16} className="text-slate-300 dark:text-slate-600 group-hover:text-indigo-500" />
                                          </a>

                                          <a href="https://modoexpertoschool.com/kitesurf/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                                              <div className="w-12 h-12 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                                  <MIcon name="star" size={24} />
                                              </div>
                                              <div className="flex-1">
                                                  <h4 className="font-bold text-sm text-slate-800 dark:text-white group-hover:text-amber-600 dark:group-hover:text-amber-400 transition-colors">Modo Experto School</h4>
                                                  <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-tight mt-0.5">{t.partnerModoDesc}</p>
                                              </div>
                                              <MIcon name="external-link" size={16} className="text-slate-300 dark:text-slate-600 group-hover:text-amber-500" />
                                          </a>
                                          
                                          <a href="https://feelviana.com/" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors group border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                                              <div className="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-xl flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                                                  <MIcon name="building" size={24} />
                                              </div>
                                              <div className="flex-1">
                                                  <h4 className="font-bold text-sm text-slate-800 dark:text-white group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors">Hotel FeelViana</h4>
                                                  <p className="text-[10px] text-slate-500 dark:text-slate-400 leading-tight mt-0.5">{t.partnerFeelVianaDesc}</p>
                                              </div>
                                              <MIcon name="external-link" size={16} className="text-slate-300 dark:text-slate-600 group-hover:text-purple-500" />
                                          </a>
                                      </div>
                                  </div>
                              </div>
                          </div>
                      </div>
                  )}

                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
